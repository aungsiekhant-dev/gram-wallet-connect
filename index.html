<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>TON Connect — GramAlert</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0e1626;
  color:#e8eef7;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:28px 20px;
  box-sizing:border-box;
}

.logo{
  width:64px;
  height:64px;
  border-radius:16px;
  background:linear-gradient(135deg,#0098EA,#0057B8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  margin-bottom:18px;
}

h1{
  font-size:20px;
  margin:0 0 6px;
}

p{
  color:#8a9bb4;
  font-size:14px;
  text-align:center;
  max-width:340px;
  line-height:1.55;
  margin:0 0 26px;
}

#tc-root{
  width:100%;
  max-width:340px;
}

#tc-root button{
  width:100%!important;
}

.status{
  margin-top:18px;
  font-size:13px;
  color:#8a9bb4;
  text-align:center;
}

.err{
  color:#ff6b6b;
}
</style>

</head>

<body>

<div class="logo">💎</div>

<h1>Connect TON Wallet</h1>

<p>
Link your Tonkeeper or MyTonWallet to GramAlert to track your portfolio and receive real-time alerts.
</p>

<div id="tc-root"></div>

<div class="status" id="status">
Loading wallet UI...
</div>


<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<script>

(function(){

const tg = window.Telegram && window.Telegram.WebApp;

if(tg){
  try{
    tg.ready();
    tg.expand();
  }catch(e){}
}


const status=document.getElementById("status");


function setStatus(msg,error=false){

  status.textContent=msg;
  status.className="status";

  if(error){
    status.className+=" err";
  }

}


function sendBack(address){

  setStatus("Connected! Sending to bot...");

  if(tg && typeof tg.sendData==="function"){

    tg.sendData(JSON.stringify({
      address:address,
      source:"ton_connect"
    }));

    setTimeout(()=>{
      try{
        tg.close();
      }catch(e){}
    },500);

  }

}


function init(){

if(typeof TON_CONNECT_UI==="undefined"){

 setStatus(
 "TON Connect library failed to load",
 true
 );

 return;

}


let tc;

try{

tc=new TON_CONNECT_UI.TonConnectUI({

manifestUrl:
"https://aungsiekhant-dev.github.io/gram-wallet-connect/tonconnect-manifest.json",

buttonRootId:"tc-root"

});


}catch(e){

setStatus(
"Init error: "+e.message,
true
);

return;

}


setStatus("Choose a wallet to connect.");


tc.onStatusChange(function(wallet){

if(wallet && wallet.account){

sendBack(wallet.account.address);

}

});


}


if(typeof TON_CONNECT_UI!=="undefined"){

init();

}else{

setTimeout(function(){

if(typeof TON_CONNECT_UI!=="undefined"){

init();

}else{

setStatus(
"Failed to load TON Connect library.",
true
);

}

},8000);

}


})();

</script>

</body>
</html>
