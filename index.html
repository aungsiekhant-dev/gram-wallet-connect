<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TON Connect — GramAlert</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e1626;color:#e8eef7;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px 20px;box-sizing:border-box;}
  .logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0098EA,#0057B8);display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,152,234,.35);}
  h1{font-size:20px;margin:0 0 6px;font-weight:700;}
  p{color:#8a9bb4;font-size:14px;text-align:center;max-width:340px;line-height:1.55;margin:0 0 26px;}
  #tc-root{width:100%;max-width:340px;}
  #tc-root button{width:100%!important;}
  .status{margin-top:18px;font-size:13px;color:#8a9bb4;text-align:center;min-height:18px;}
  .err{color:#ff6b6b;}
</style>
</head>
<body>
  <div class="logo">💎</div>
  <h1>Connect TON Wallet</h1>
  <p>Link your Tonkeeper or MyTonWallet to GramAlert to track your portfolio and receive real-time alerts.</p>
  <div id="tc-root"></div>
  <div class="status" id="status">Loading wallet UI…</div>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg){ try{ tg.ready(); tg.expand(); tg.setHeaderColor('#0e1626'); tg.setBackgroundColor('#0e1626'); }catch(e){} }
      var status = document.getElementById('status');
      function setStatus(msg, isErr){ status.textContent = msg; status.className = 'status' + (isErr ? ' err' : ''); }
      function sendBack(addr){
        setStatus('Connected! Sending to bot…');
        if (tg && typeof tg.sendData === 'function'){
          try{ tg.sendData(JSON.stringify({ address: addr, source: 'ton_connect' })); }
          catch(e){ setStatus('sendData error: ' + e.message, true); return; }
          setTimeout(function(){ try{ tg.close(); }catch(e){} }, 500);
        } else {
          setStatus('Connected: ' + addr + ' — return to the bot and refresh.', true);
        }
      }
      function init(){
        if (!window.TonConnectUI){ setStatus('Failed to load TON Connect library. Check your connection.', true); return; }
        var tc;
        try{ tc = new window.TonConnectUI({ manifestUrl: 'https://base44.app/api/apps/6a5a1a79f1a678ff57eb227f/files/mp/public/6a5a1a79f1a678ff57eb227f/f64036c10_tonconnect-manifest.json', buttonRootId: 'tc-root' }); }
        catch(e){ setStatus('Init error: ' + e.message, true); return; }
        setStatus('Choose a wallet to connect.');
        try{ if (tc.wallet && tc.wallet.account){ sendBack(tc.wallet.account.address); return; } }catch(e){}
        try{ tc.openModal(); }catch(e){}
        try{ tc.onStatusChange(function(w){ if (w && w.account && w.account.address){ sendBack(w.account.address); } }); }catch(e){}
      }
      if (window.TonConnectUI){ init(); }
      else { var iv=setInterval(function(){ if(window.TonConnectUI){ clearInterval(iv); init(); } },200); setTimeout(function(){ clearInterval(iv); if(!window.TonConnectUI){ setStatus('Failed to load TON Connect library.', true);} }, 8000); }
    })();
  </script>
</body>
</html>
