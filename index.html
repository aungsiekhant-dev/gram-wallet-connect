<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TON Connect — GramAlert</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body{
background:#0e1626;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:40px 20px;
}

.logo{
font-size:50px;
}

h1{
font-size:22px;
}

p{
color:#9aa8bd;
}

#tc-root{
margin-top:30px;
}

.status{
margin-top:20px;
color:#9aa8bd;
}

.error{
color:red;
}
</style>

</head>

<body>

<div class="logo">💎</div>

<h1>Connect TON Wallet</h1>

<p>
Link your Tonkeeper or MyTonWallet to GramAlert to track your portfolio.
</p>

<div id="tc-root"></div>

<div class="status" id="status">
Loading wallet UI...
</div>


<script>

let status=document.getElementById("status");


function msg(text,error=false){
status.innerHTML=text;
status.className=error?"status error":"status";
}


function start(){

if(typeof TON_CONNECT_UI==="undefined"){

msg("TON Connect failed loading. Refresh.",true);
return;

}


let connector;


try{

connector=new TON_CONNECT_UI.TonConnectUI({

manifestUrl:
"https://aungsiekhant-dev.github.io/gram-wallet-connect/tonconnect-manifest.json",

buttonRootId:"tc-root"

});


}catch(e){

msg(e.message,true);
return;

}


msg("Choose wallet");


connector.onStatusChange(wallet=>{

if(wallet){

msg("Connected!");

let address=wallet.account.address;


let tg=window.Telegram.WebApp;


if(tg){

tg.sendData(JSON.stringify({
address:address
}));

}

}

});


}



window.onload=function(){

setTimeout(start,1000);

};


</script>

</body>
</html>
